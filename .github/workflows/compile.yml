on: workflow_call

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6

      - name: Install cibuildwheel

        run: python -m pip install cibuildwheel==4.0.0rc1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
            CIBW_ENVIRONMENT: ORJSON_BUILD_FREETHREADED=1
            CIBW_TEST_REQUIRES: orjson
            CIBW_TEST_SKIP: "cp314t-win*" # failing to compile orjson for this configuration
            CIBW_TEST_COMMAND: >
                python -m unittest discover {package} &&
                python -m doctest {package}/chompjs/chompjs.py --verbose

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: chompjs-sdist
          path: dist/*.tar.gz
